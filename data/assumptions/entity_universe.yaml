# ---------------------------------------------------------------------------
# XBRL tag mapping: us-gaap concepts to pull from EDGAR companyfacts.
# Lists are tried in order; first available tag wins (companies tag differently).
# ---------------------------------------------------------------------------
xbrl_concepts:
  capex:
    - "PaymentsToAcquirePropertyPlantAndEquipment"
    - "PaymentsToAcquireProductiveAssets"
  operating_cash_flow:
    - "NetCashProvidedByUsedInOperatingActivities"
  revenue:
    - "RevenueFromContractWithCustomerExcludingAssessedTax"
    - "Revenues"
  operating_income:
    - "OperatingIncomeLoss"
  total_debt:
    - "DebtLongtermAndShorttermCombinedAmount"
  long_term_debt:
    - "LongTermDebtNoncurrent"
    - "LongTermDebt"
  short_term_debt:
    - "LongTermDebtCurrent"
    - "DebtCurrent"
  interest_expense:
    - "InterestExpense"
    - "InterestExpenseNonoperating"
  operating_lease_liabilities:
    - "OperatingLeaseLiability"
  finance_lease_liabilities:
    - "FinanceLeaseLiability"
  cash_and_equivalents:
    - "CashAndCashEquivalentsAtCarryingValue"
  marketable_securities:
    - "MarketableSecuritiesNoncurrent"
    - "ShortTermInvestments"

# ---------------------------------------------------------------------------
# Sector-level contagion nodes (for the contagion module). Edge weights live in
# base_assumptions / contagion defaults; this just enumerates the node set.
# ---------------------------------------------------------------------------
contagion_nodes:
  - hyperscalers
  - datacenter_operators
  - private_credit_funds
  - bdcs
  - insurers
  - pensions
  - banks
  - corporate_bond_funds
  - securitization_investors
  - utilities
  - chip_suppliers
  - pe_funds_lps
