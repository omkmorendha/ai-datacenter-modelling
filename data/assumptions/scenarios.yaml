# =============================================================================
# Scenario definitions for the AI data-center macro stress model (v0).
#
# Each scenario expresses SHOCKS relative to the base case. Shocks are applied
# on top of base assumptions / observed data. Units:
#   *_bps          : additive basis-point shock to a rate or spread
#   *_pct          : multiplicative percent change (e.g. +0.10 = +10%)
#   *_delta        : additive delta in native units
#   *_mult         : multiplier applied to a base quantity (e.g. 2.0 = double)
#
# These are stress assumptions, not forecasts.
# =============================================================================

scenarios:

  base_case:
    label: "Base case"
    description: "SOFR/10Y/30Y unchanged, modest spreads, stable power, high AI utilization, securitization open."
    rates:
      sofr_bps: 0
      dgs2_bps: 0
      dgs10_bps: 0
      dgs30_bps: 0
      term_premium_bps: 0
    credit:
      credit_spread_bps: 0
      refinancing_probability_delta: 0.0
      securitization_open: true
      securitization_haircut_delta: 0.0
      cap_rate_bps: 0
    power:
      power_price_pct: 0.0
    ai_demand:
      utilization_delta: 0.0
      revenue_per_mw_pct: 0.0
    private_credit:
      nav_haircut: 0.0
      default_probability_mult: 1.0
      recovery_rate_delta: 0.0
      new_lending_capacity_pct: 0.0
    equity:
      valuation_haircut: 0.0
    inflation:
      inflation_expectations_bps: 0

  high_for_longer:
    label: "High for longer"
    description: "SOFR +100, 10Y/30Y +75, spreads +75, power +10%, utilization unchanged."
    rates:
      sofr_bps: 100
      dgs2_bps: 90
      dgs10_bps: 75
      dgs30_bps: 75
      term_premium_bps: 25
    credit:
      credit_spread_bps: 75
      refinancing_probability_delta: -0.05
      securitization_open: true
      securitization_haircut_delta: 0.02
      cap_rate_bps: 50
    power:
      power_price_pct: 0.10
    ai_demand:
      utilization_delta: 0.0
      revenue_per_mw_pct: 0.0
    private_credit:
      nav_haircut: 0.02
      default_probability_mult: 1.2
      recovery_rate_delta: 0.0
      new_lending_capacity_pct: -0.10
    equity:
      valuation_haircut: 0.05
    inflation:
      inflation_expectations_bps: 0

  treasury_term_premium_shock:
    label: "Treasury term-premium shock"
    description: "SOFR +50, 10Y +150, 30Y +200, spreads +150, securitization haircut up, cap rates rise, refi worsens."
    rates:
      sofr_bps: 50
      dgs2_bps: 75
      dgs10_bps: 150
      dgs30_bps: 200
      term_premium_bps: 125
    credit:
      credit_spread_bps: 150
      refinancing_probability_delta: -0.20
      securitization_open: true
      securitization_haircut_delta: 0.08
      cap_rate_bps: 150
    power:
      power_price_pct: 0.0
    ai_demand:
      utilization_delta: 0.0
      revenue_per_mw_pct: 0.0
    private_credit:
      nav_haircut: 0.05
      default_probability_mult: 1.4
      recovery_rate_delta: -0.05
      new_lending_capacity_pct: -0.20
    equity:
      valuation_haircut: 0.10
    inflation:
      inflation_expectations_bps: 25

  iran_oil_inflation_shock:
    label: "Iran / oil inflation shock"
    description: "Geopolitical oil spike: SOFR +100, 10Y +100, 30Y +125, power +25%, infl exp +50, spreads +100."
    rates:
      sofr_bps: 100
      dgs2_bps: 100
      dgs10_bps: 100
      dgs30_bps: 125
      term_premium_bps: 50
    credit:
      credit_spread_bps: 100
      refinancing_probability_delta: -0.10
      securitization_open: true
      securitization_haircut_delta: 0.05
      cap_rate_bps: 75
    power:
      power_price_pct: 0.25
    ai_demand:
      utilization_delta: 0.0
      revenue_per_mw_pct: 0.0
    private_credit:
      nav_haircut: 0.04
      default_probability_mult: 1.3
      recovery_rate_delta: -0.03
      new_lending_capacity_pct: -0.15
    equity:
      valuation_haircut: 0.08
    inflation:
      inflation_expectations_bps: 50

  ai_revenue_disappointment:
    label: "AI revenue disappointment"
    description: "Utilization -20%, revenue/MW -15%, spreads +100, equity -25%, capex cuts begin."
    rates:
      sofr_bps: 0
      dgs2_bps: 0
      dgs10_bps: -25
      dgs30_bps: -25
      term_premium_bps: 0
    credit:
      credit_spread_bps: 100
      refinancing_probability_delta: -0.15
      securitization_open: true
      securitization_haircut_delta: 0.05
      cap_rate_bps: 100
    power:
      power_price_pct: 0.0
    ai_demand:
      utilization_delta: -0.20
      revenue_per_mw_pct: -0.15
    private_credit:
      nav_haircut: 0.08
      default_probability_mult: 1.8
      recovery_rate_delta: -0.05
      new_lending_capacity_pct: -0.20
    equity:
      valuation_haircut: 0.25
    inflation:
      inflation_expectations_bps: 0
    capex:
      capex_cut_pct: -0.20

  severe_private_credit_liquidity_crunch:
    label: "Severe private-credit liquidity crunch"
    description: "SOFR +150, spreads +250, PC NAV -15%, PD doubles, recovery falls, new lending -40%, securitization partly closed."
    rates:
      sofr_bps: 150
      dgs2_bps: 100
      dgs10_bps: 50
      dgs30_bps: 50
      term_premium_bps: 50
    credit:
      credit_spread_bps: 250
      refinancing_probability_delta: -0.35
      securitization_open: false
      securitization_haircut_delta: 0.15
      cap_rate_bps: 150
    power:
      power_price_pct: 0.0
    ai_demand:
      utilization_delta: 0.0
      revenue_per_mw_pct: 0.0
    private_credit:
      nav_haircut: 0.15
      default_probability_mult: 2.0
      recovery_rate_delta: -0.15
      new_lending_capacity_pct: -0.40
    equity:
      valuation_haircut: 0.15
    inflation:
      inflation_expectations_bps: 0

  combined_severe_case:
    label: "Combined severe case"
    description: "Treasury shock + AI disappointment + power shock + private-credit liquidity crunch, stacked."
    rates:
      sofr_bps: 150
      dgs2_bps: 125
      dgs10_bps: 150
      dgs30_bps: 200
      term_premium_bps: 125
    credit:
      credit_spread_bps: 300
      refinancing_probability_delta: -0.45
      securitization_open: false
      securitization_haircut_delta: 0.20
      cap_rate_bps: 200
    power:
      power_price_pct: 0.25
    ai_demand:
      utilization_delta: -0.20
      revenue_per_mw_pct: -0.15
    private_credit:
      nav_haircut: 0.20
      default_probability_mult: 2.5
      recovery_rate_delta: -0.15
      new_lending_capacity_pct: -0.50
    equity:
      valuation_haircut: 0.35
    inflation:
      inflation_expectations_bps: 50
    capex:
      capex_cut_pct: -0.30
